<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物定位 - 概念预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-b from-purple-50 to-white min-h-screen font-[Inter] max-w-[375px] mx-auto relative overflow-x-hidden">

    <!-- 顶部导航 -->
    <div class="px-4 pt-4 pb-3 flex items-center gap-2">
        <div class="w-8 h-8 flex items-center justify-center">
            <i data-lucide="arrow-left" class="w-5 h-5 text-gray-700"></i>
        </div>
        <h1 class="text-lg font-semibold text-gray-900 tracking-tight">宠物定位</h1>
        <div class="ml-auto flex items-center gap-2">
            <i data-lucide="settings" class="w-5 h-5 text-gray-400"></i>
        </div>
    </div>

    <!-- 地图区域 -->
    <div class="mx-4 rounded-2xl overflow-hidden shadow-sm relative" style="height: 220px;">
        <div class="absolute inset-0 bg-gradient-to-br from-green-100 via-green-50 to-blue-50">
            <!-- 模拟地图网格 -->
            <div class="absolute inset-0 opacity-20">
                <div class="grid grid-cols-6 grid-rows-5 h-full w-full">
                    <div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div>
                    <div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div>
                    <div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div>
                    <div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div>
                    <div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div><div class="border border-gray-300"></div>
                </div>
            </div>
            <!-- 模拟道路 -->
            <div class="absolute top-1/2 left-0 right-0 h-1 bg-gray-300/50"></div>
            <div class="absolute top-0 bottom-0 left-1/3 w-1 bg-gray-300/50"></div>
            <div class="absolute top-0 bottom-0 right-1/4 w-0.5 bg-gray-300/40"></div>
            <!-- 轨迹线 -->
            <svg class="absolute inset-0 w-full h-full" viewBox="0 0 340 220">
                <path d="M 80 180 Q 120 140 160 130 Q 200 120 220 90 Q 240 60 260 70" stroke="#8b5cf6" stroke-width="3" fill="none" stroke-dasharray="6 4" opacity="0.7"/>
                <circle cx="80" cy="180" r="4" fill="#8b5cf6" opacity="0.5"/>
                <circle cx="160" cy="130" r="3" fill="#8b5cf6" opacity="0.4"/>
            </svg>
            <!-- 定位标记 -->
            <div class="absolute" style="top: 55px; right: 70px;">
                <div class="relative">
                    <div class="w-10 h-10 rounded-full bg-purple-600 shadow-lg flex items-center justify-center animate-pulse">
                        <i data-lucide="paw-print" class="w-5 h-5 text-white"></i>
                    </div>
                    <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-3 h-3 bg-purple-600 rotate-45"></div>
                </div>
            </div>
        </div>
        <!-- 地图控件 -->
        <div class="absolute bottom-3 right-3 flex flex-col gap-2">
            <button class="w-8 h-8 rounded-lg bg-white shadow flex items-center justify-center">
                <i data-lucide="plus" class="w-4 h-4 text-gray-600"></i>
            </button>
            <button class="w-8 h-8 rounded-lg bg-white shadow flex items-center justify-center">
                <i data-lucide="minus" class="w-4 h-4 text-gray-600"></i>
            </button>
        </div>
        <!-- 实时标签 -->
        <div class="absolute top-3 left-3 px-2 py-1 rounded-full bg-green-500 text-white text-[10px] flex items-center gap-1">
            <div class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></div>
            实时定位中
        </div>
    </div>

    <!-- 宠物状态卡 -->
    <div class="mx-4 mt-4 rounded-2xl bg-white shadow-sm p-4">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-purple-100 to-pink-100 flex items-center justify-center">
                <i data-lucide="cat" class="w-6 h-6 text-purple-500"></i>
            </div>
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <span class="text-sm font-semibold text-gray-900">布丁</span>
                    <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-green-50 text-green-600 border border-green-200">在线</span>
                </div>
                <div class="text-xs text-gray-400 mt-0.5">最后更新：2 分钟前</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400">距你</div>
                <div class="text-sm font-semibold text-purple-600">120m</div>
            </div>
        </div>
    </div>

    <!-- 安全围栏 -->
    <div class="mx-4 mt-4 rounded-2xl bg-white shadow-sm p-4">
        <div class="flex items-center gap-2 mb-3">
            <i data-lucide="shield-check" class="w-4 h-4 text-purple-600"></i>
            <span class="text-sm font-semibold text-gray-900">安全围栏</span>
            <span class="ml-auto text-[10px] px-2 py-0.5 rounded-full bg-green-50 text-green-600">正常</span>
        </div>
        <div class="space-y-2">
            <div class="flex items-center justify-between py-2 border-b border-gray-50">
                <div class="flex items-center gap-2">
                    <i data-lucide="home" class="w-3.5 h-3.5 text-gray-400"></i>
                    <span class="text-xs text-gray-700">家（半径 200m）</span>
                </div>
                <span class="text-[10px] text-green-600">范围内</span>
            </div>
            <div class="flex items-center justify-between py-2">
                <div class="flex items-center gap-2">
                    <i data-lucide="trees" class="w-3.5 h-3.5 text-gray-400"></i>
                    <span class="text-xs text-gray-700">小区公园（半径 500m）</span>
                </div>
                <span class="text-[10px] text-green-600">范围内</span>
            </div>
        </div>
    </div>

    <!-- 今日活动轨迹 -->
    <div class="mx-4 mt-4 rounded-2xl bg-white shadow-sm p-4">
        <div class="flex items-center gap-2 mb-3">
            <i data-lucide="route" class="w-4 h-4 text-purple-600"></i>
            <span class="text-sm font-semibold text-gray-900">今日轨迹</span>
        </div>
        <div class="grid grid-cols-3 gap-3 text-center">
            <div>
                <div class="text-lg font-semibold text-gray-900">1.2</div>
                <div class="text-[10px] text-gray-400">公里</div>
            </div>
            <div>
                <div class="text-lg font-semibold text-gray-900">45</div>
                <div class="text-[10px] text-gray-400">分钟</div>
            </div>
            <div>
                <div class="text-lg font-semibold text-gray-900">3</div>
                <div class="text-[10px] text-gray-400">次外出</div>
            </div>
        </div>
    </div>

    <!-- 走失提醒设置 -->
    <div class="mx-4 mt-4 mb-8 rounded-2xl bg-gradient-to-r from-orange-50 to-red-50 border border-orange-200 p-4">
        <div class="flex items-center gap-2">
            <i data-lucide="bell-ring" class="w-4 h-4 text-orange-500"></i>
            <span class="text-sm font-medium text-gray-900">走失提醒</span>
            <div class="ml-auto w-9 h-5 rounded-full bg-orange-400 relative">
                <div class="absolute right-0.5 top-0.5 w-4 h-4 rounded-full bg-white shadow"></div>
            </div>
        </div>
        <p class="text-[10px] text-gray-500 mt-1.5">超出安全围栏时立即推送通知</p>
    </div>

    <!-- 概念预览水印 -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-[0.03] text-6xl font-bold text-purple-900 rotate-[-15deg] whitespace-nowrap">
        概念预览
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
