<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>visual foundation host</title>
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <style>
      body {
        margin: 0;
        font-family: var(--font-family);
        background: var(--color-bg);
        color: var(--color-text-primary);
        padding: var(--space-5);
        display: flex;
        flex-direction: column;
        gap: var(--space-5);
      }
      .swatch-row { display: flex; gap: var(--space-3); }
      .swatch {
        width: 48px; height: 48px;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-card);
      }
      .card {
        background: var(--color-card);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        box-shadow: var(--shadow-card);
      }
      .card.elevated { box-shadow: var(--shadow-elevated); }
      .bubble {
        display: inline-block;
        padding: var(--space-3) var(--space-4);
        border-radius: var(--radius-lg);
        background: rgba(255, 184, 77, 0.22);
        font-size: var(--text-body);
        font-weight: var(--font-weight-medium);
        box-shadow: var(--shadow-card);
      }
    </style>
  </head>
  <body>
    <h1 data-testid="viz-title" style="font-size: var(--text-h1); margin: 0;">visual foundation host</h1>

    <section data-testid="viz-swatches" class="swatch-row">
      <div class="swatch" style="background: var(--color-primary);"></div>
      <div class="swatch" style="background: var(--color-bg); border: 1px solid var(--color-divider);"></div>
      <div class="swatch" style="background: var(--color-success);"></div>
      <div class="swatch" style="background: var(--color-info);"></div>
      <div class="swatch" style="background: var(--color-warning);"></div>
    </section>

    <section data-testid="viz-card-flat" class="card">flat card</section>
    <section data-testid="viz-card-elevated" class="card elevated">elevated card</section>

    <section>
      <span data-testid="viz-bubble" class="bubble">今天精神不错～</span>
    </section>
  </body>
</html>
