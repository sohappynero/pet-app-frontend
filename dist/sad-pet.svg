<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <defs>
    <!-- 水彩晕染渐变 -->
    <radialGradient id="furGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F5E6D3" />
      <stop offset="50%" stop-color="#E8D5C4" />
      <stop offset="100%" stop-color="#D4C4B0" />
    </radialGradient>
    <radialGradient id="earGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#E8D5C4" />
      <stop offset="100%" stop-color="#C9B8A8" />
    </radialGradient>
    <radialGradient id="blushGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB5B5" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFB5B5" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="tearGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8D8EA" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#A8D8EA" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- 身体（趴着的姿势） -->
  <ellipse cx="100" cy="145" rx="55" ry="28" fill="url(#furGrad)" stroke="#C9B8A8" stroke-width="1.2" opacity="0.9"/>

  <!-- 左耳（下垂） -->
  <path d="M 62 72 Q 45 88 50 108 Q 58 100 66 85 Z" fill="url(#earGrad)" stroke="#B8A898" stroke-width="1" stroke-linejoin="round"/>
  <path d="M 58 80 Q 52 90 55 100" fill="none" stroke="#D4C4B0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 右耳（下垂） -->
  <path d="M 138 72 Q 155 88 150 108 Q 142 100 134 85 Z" fill="url(#earGrad)" stroke="#B8A898" stroke-width="1" stroke-linejoin="round"/>
  <path d="M 142 80 Q 148 90 145 100" fill="none" stroke="#D4C4B0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 头部 -->
  <ellipse cx="100" cy="88" rx="42" ry="36" fill="url(#furGrad)" stroke="#C9B8A8" stroke-width="1.2"/>

  <!-- 头顶毛发纹理 -->
  <path d="M 80 58 Q 90 52 100 56 Q 110 52 120 58" fill="none" stroke="#D4C4B0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 左眼（委屈的下垂眼） -->
  <ellipse cx="82" cy="92" rx="7" ry="5" fill="#4A3728"/>
  <ellipse cx="84" cy="90" rx="2.5" ry="2" fill="#FFF"/>
  <!-- 眉毛（八字眉，委屈） -->
  <path d="M 74 82 Q 80 86 86 84" fill="none" stroke="#8B7D6B" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 右眼（委屈的下垂眼） -->
  <ellipse cx="118" cy="92" rx="7" ry="5" fill="#4A3728"/>
  <ellipse cx="120" cy="90" rx="2.5" ry="2" fill="#FFF"/>
  <!-- 眉毛（八字眉） -->
  <path d="M 114 84 Q 120 86 126 82" fill="none" stroke="#8B7D6B" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 鼻子 -->
  <ellipse cx="100" cy="104" rx="5" ry="3.5" fill="#C4948A"/>
  <ellipse cx="100" cy="103" rx="2" ry="1.2" fill="#D4A59A"/>

  <!-- 嘴巴（向下撇，委屈） -->
  <path d="M 94 110 Q 100 106 106 110" fill="none" stroke="#8B7D6B" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 96 112 Q 100 115 104 112" fill="none" stroke="#8B7D6B" stroke-width="1" stroke-linecap="round"/>

  <!-- 腮红 -->
  <ellipse cx="72" cy="102" rx="10" ry="7" fill="url(#blushGrad)"/>
  <ellipse cx="128" cy="102" rx="10" ry="7" fill="url(#blushGrad)"/>

  <!-- 左眼泪珠 -->
  <ellipse cx="72" cy="100" rx="3" ry="5" fill="url(#tearGrad)"/>
  <circle cx="71.5" cy="97" r="1.2" fill="#FFF" opacity="0.7"/>

  <!-- 右眼泪珠 -->
  <ellipse cx="128" cy="100" rx="3" ry="5" fill="url(#tearGrad)"/>
  <circle cx="127.5" cy="97" r="1.2" fill="#FFF" opacity="0.7"/>

  <!-- 前爪（叠在一起，委屈地缩着） -->
  <ellipse cx="85" cy="148" rx="12" ry="8" fill="#E8D5C4" stroke="#C9B8A8" stroke-width="1"/>
  <ellipse cx="115" cy="148" rx="12" ry="8" fill="#E8D5C4" stroke="#C9B8A8" stroke-width="1"/>
  <!-- 爪垫 -->
  <ellipse cx="85" cy="150" rx="5" ry="3" fill="#D4A59A" opacity="0.6"/>
  <ellipse cx="115" cy="150" rx="5" ry="3" fill="#D4A59A" opacity="0.6"/>

  <!-- 尾巴（垂下来） -->
  <path d="M 150 145 Q 168 152 165 165 Q 158 168 152 158" fill="#E8D5C4" stroke="#C9B8A8" stroke-width="1" stroke-linejoin="round"/>

  <!-- 装饰：飘落的花瓣（手绘感） -->
  <g opacity="0.5">
    <path d="M 35 45 Q 38 40 42 44 Q 38 48 35 45 Z" fill="#F4B5C6" stroke="#E8A0B5" stroke-width="0.5"/>
    <path d="M 160 35 Q 164 30 168 35 Q 163 40 160 35 Z" fill="#F4B5C6" stroke="#E8A0B5" stroke-width="0.5"/>
    <path d="M 145 155 Q 148 150 152 154 Q 148 158 145 155 Z" fill="#C4B5FD" stroke="#B8A5F0" stroke-width="0.5"/>
    <path d="M 50 160 Q 53 155 57 159 Q 53 163 50 160 Z" fill="#C4B5FD" stroke="#B8A5F0" stroke-width="0.5"/>
  </g>

  <!-- 小草装饰 -->
  <g stroke="#A7C794" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M 30 165 Q 28 155 32 150"/>
    <path d="M 35 165 Q 36 158 33 153"/>
    <path d="M 165 168 Q 167 158 163 153"/>
    <path d="M 170 168 Q 168 160 172 155"/>
  </g>
</svg>
