<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物社区 - 概念预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-b from-purple-50 to-white min-h-screen font-[Inter] max-w-[375px] mx-auto relative overflow-x-hidden">

    <!-- 顶部导航 -->
    <div class="px-4 pt-4 pb-3 flex items-center gap-2">
        <div class="w-8 h-8 flex items-center justify-center">
            <i data-lucide="arrow-left" class="w-5 h-5 text-gray-700"></i>
        </div>
        <h1 class="text-lg font-semibold text-gray-900 tracking-tight">宠物社区</h1>
        <div class="ml-auto flex items-center gap-3">
            <i data-lucide="search" class="w-5 h-5 text-gray-500"></i>
            <i data-lucide="bell" class="w-5 h-5 text-gray-500"></i>
        </div>
    </div>

    <!-- Tab 切换 -->
    <div class="px-4 mb-4">
        <div class="flex gap-1 bg-white rounded-xl p-1 shadow-sm">
            <button class="flex-1 py-2 rounded-lg bg-gradient-to-r from-purple-600 to-pink-500 text-white text-xs font-medium">推荐</button>
            <button class="flex-1 py-2 rounded-lg text-gray-500 text-xs font-medium">关注</button>
            <button class="flex-1 py-2 rounded-lg text-gray-500 text-xs font-medium">话题</button>
            <button class="flex-1 py-2 rounded-lg text-gray-500 text-xs font-medium">问答</button>
        </div>
    </div>

    <!-- 帖子列表 -->
    <div class="px-4 space-y-4">

        <!-- 帖子 1 -->
        <div class="rounded-2xl bg-white shadow-sm overflow-hidden">
            <!-- 用户信息 -->
            <div class="p-4 pb-2 flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-purple-400 to-pink-400 flex items-center justify-center">
                    <span class="text-white text-xs font-semibold">猫</span>
                </div>
                <div class="flex-1">
                    <div class="text-sm font-medium text-gray-900">布丁妈妈</div>
                    <div class="text-[10px] text-gray-400">3 小时前 · 英短蓝猫</div>
                </div>
                <button class="px-3 py-1 rounded-full text-xs border border-purple-200 text-purple-600">
                    + 关注
                </button>
            </div>
            <!-- 内容 -->
            <div class="px-4 pb-3">
                <p class="text-sm text-gray-700 leading-relaxed">今天带布丁去打疫苗啦，全程超级乖没有叫，医生都夸他是好孩子！回来奖励了小鱼干 🐟</p>
            </div>
            <!-- 图片区 -->
            <div class="px-4 pb-3">
                <div class="grid grid-cols-3 gap-1.5 rounded-xl overflow-hidden">
                    <div class="aspect-square bg-gradient-to-br from-purple-100 to-pink-50 flex items-center justify-center">
                        <i data-lucide="cat" class="w-8 h-8 text-purple-200"></i>
                    </div>
                    <div class="aspect-square bg-gradient-to-br from-blue-50 to-purple-50 flex items-center justify-center">
                        <i data-lucide="image" class="w-6 h-6 text-purple-200"></i>
                    </div>
                    <div class="aspect-square bg-gradient-to-br from-pink-50 to-orange-50 flex items-center justify-center">
                        <i data-lucide="image" class="w-6 h-6 text-purple-200"></i>
                    </div>
                </div>
            </div>
            <!-- 互动栏 -->
            <div class="px-4 pb-3 flex items-center gap-5">
                <div class="flex items-center gap-1 text-gray-400">
                    <i data-lucide="heart" class="w-4 h-4"></i>
                    <span class="text-xs">128</span>
                </div>
                <div class="flex items-center gap-1 text-gray-400">
                    <i data-lucide="message-circle" class="w-4 h-4"></i>
                    <span class="text-xs">32</span>
                </div>
                <div class="flex items-center gap-1 text-gray-400">
                    <i data-lucide="share-2" class="w-4 h-4"></i>
                    <span class="text-xs">分享</span>
                </div>
            </div>
        </div>

        <!-- 帖子 2 -->
        <div class="rounded-2xl bg-white shadow-sm overflow-hidden">
            <div class="p-4 pb-2 flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-orange-400 to-red-400 flex items-center justify-center">
                    <span class="text-white text-xs font-semibold">柴</span>
                </div>
                <div class="flex-1">
                    <div class="text-sm font-medium text-gray-900">旺财爸爸</div>
                    <div class="text-[10px] text-gray-400">5 小时前 · 柴犬</div>
                </div>
                <button class="px-3 py-1 rounded-full text-xs border border-purple-200 text-purple-600">
                    + 关注
                </button>
            </div>
            <div class="px-4 pb-3">
                <p class="text-sm text-gray-700 leading-relaxed">分享一个自制狗粮食谱：鸡胸肉 + 胡萝卜 + 西蓝花 + 糙米，旺财连吃了三天还不够！营养均衡又便宜</p>
            </div>
            <div class="px-4 pb-3">
                <div class="grid grid-cols-2 gap-1.5 rounded-xl overflow-hidden">
                    <div class="aspect-[4/3] bg-gradient-to-br from-orange-50 to-yellow-50 flex items-center justify-center">
                        <i data-lucide="chef-hat" class="w-8 h-8 text-orange-200"></i>
                    </div>
                    <div class="aspect-[4/3] bg-gradient-to-br from-green-50 to-emerald-50 flex items-center justify-center">
                        <i data-lucide="image" class="w-6 h-6 text-green-200"></i>
                    </div>
                </div>
            </div>
            <!-- 话题标签 -->
            <div class="px-4 pb-2 flex items-center gap-2">
                <span class="text-[10px] px-2 py-0.5 rounded-full bg-purple-50 text-purple-600"># 自制粮食谱</span>
                <span class="text-[10px] px-2 py-0.5 rounded-full bg-pink-50 text-pink-600"># 健康饮食</span>
            </div>
            <div class="px-4 pb-3 flex items-center gap-5">
                <div class="flex items-center gap-1 text-pink-500">
                    <i data-lucide="heart" class="w-4 h-4 fill-pink-500"></i>
                    <span class="text-xs">256</span>
                </div>
                <div class="flex items-center gap-1 text-gray-400">
                    <i data-lucide="message-circle" class="w-4 h-4"></i>
                    <span class="text-xs">48</span>
                </div>
                <div class="flex items-center gap-1 text-gray-400">
                    <i data-lucide="bookmark" class="w-4 h-4"></i>
                    <span class="text-xs">收藏</span>
                </div>
            </div>
        </div>

        <!-- 帖子 3 - 问答类型 -->
        <div class="rounded-2xl bg-white shadow-sm overflow-hidden border border-purple-100">
            <div class="p-4 pb-2 flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-400 to-cyan-400 flex items-center justify-center">
                    <span class="text-white text-xs font-semibold">问</span>
                </div>
                <div class="flex-1">
                    <div class="text-sm font-medium text-gray-900">新手铲屎官</div>
                    <div class="text-[10px] text-gray-400">1 天前 · 待领养</div>
                </div>
                <span class="text-[10px] px-2 py-0.5 rounded-full bg-blue-50 text-blue-600 border border-blue-200">求助</span>
            </div>
            <div class="px-4 pb-3">
                <p class="text-sm text-gray-700 leading-relaxed">想问问大家，第一次养猫需要准备什么？预算 500 以内能搞定基础装备吗？</p>
            </div>
            <div class="px-4 pb-3">
                <div class="rounded-xl bg-purple-50/50 p-3 flex items-center gap-2">
                    <i data-lucide="message-circle" class="w-4 h-4 text-purple-500"></i>
                    <span class="text-xs text-purple-600">已有 15 条回答，点击查看</span>
                    <i data-lucide="chevron-right" class="w-3 h-3 text-purple-400 ml-auto"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部浮动发帖按钮 -->
    <div class="sticky bottom-6 px-4 mt-6">
        <button class="w-full py-3 rounded-2xl bg-gradient-to-r from-purple-600 to-pink-500 text-white text-sm font-medium shadow-lg shadow-purple-200 flex items-center justify-center gap-2">
            <i data-lucide="pen-line" class="w-4 h-4"></i>
            发布动态
        </button>
    </div>

    <!-- 概念预览水印 -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-[0.03] text-6xl font-bold text-purple-900 rotate-[-15deg] whitespace-nowrap">
        概念预览
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
